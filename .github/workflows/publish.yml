name: Publish to PyPI

# tag v* の push をトリガーに、PyPI に sdist と wheel を公開する。
# API トークン不要、Trusted Publisher (OIDC) で認証する。
#
# 事前準備 (管理者作業、PR 本体には含まれない):
#   1. PyPI 側で elvezjp/add-line-numbers と本 workflow を Trusted Publisher として登録
#      (https://pypi.org/manage/account/publishing/)
#   2. GitHub リポ Settings → Environments → "pypi" を作成
#      (保護ルール: main ブランチ + 特定承認者を推奨)
#
# リリース手順:
#   git tag vX.Y.Z
#   git push origin vX.Y.Z
#   → 本 workflow が起動し、pyproject.toml の version に対応する配布物を PyPI に公開する

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # 公開前の防護壁として、テスト全件パスを必須にする。
  # ci.yml は push/PR でしか走らないので、tag push 経路ではここで明示実行する。
  test:
    name: Run tests before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest test.py -v

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/add-line-numbers
    permissions:
      id-token: write  # Trusted Publisher (OIDC) のために必要
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
